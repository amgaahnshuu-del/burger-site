services:
  - type: web
    name: burger-app
    runtime: node
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build:render
    preDeployCommand: npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: Burger
      - key: AI_PROVIDER
        value: auto
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NEXT_PUBLIC_APP_URL
        sync: false
